name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

permissions:
    contents: read
    pull-requests: write

jobs:
    quality-checks:
        name: Quality Checks
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install mise
              uses: jdx/mise-action@v2

            - name: Install dependencies
              run: mise run install-ci

            - name: Check code quality (lint + format)
              run: mise run biome-check

            - name: Type check
              run: mise run type-check

    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install mise
              uses: jdx/mise-action@v2

            - name: Install dependencies
              run: mise run install-ci

            - name: Run unit tests
              run: mise run test

    e2e-tests:
        name: E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install mise
              uses: jdx/mise-action@v2

            - name: Install dependencies
              run: mise run install-ci

            - name: Install Playwright browsers
              run: mise run install-playwright

            - name: Start server
              run: mise run server &

            - name: Wait for server
              run: bunx wait-on http-get://localhost:4000/api/health --timeout 30000

            - name: Start client
              run: mise run client &

            - name: Wait for client
              run: bunx wait-on http-get://localhost:3000 --timeout 30000

            - name: Run E2E tests
              run: mise run test-e2e

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: playwright-report
                  path: tests/e2e/playwright-report/
                  retention-days: 7

    api-tests:
        name: API Tests
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install mise
              uses: jdx/mise-action@v2

            - name: Install dependencies
              run: mise run install-ci

            - name: Start server
              run: mise run server &

            - name: Wait for server
              run: bunx wait-on http-get://localhost:4000/api/health --timeout 30000

            - name: Run API tests
              run: mise run test-api

    build:
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install mise
              uses: jdx/mise-action@v2

            - name: Install dependencies
              run: mise run install-ci

            - name: Build all packages
              run: mise run build

            - name: Check client bundle size
              run: |
                  CLIENT_SIZE=$(du -sb packages/client/dist 2>/dev/null | cut -f1 || echo "0")
                  MAX_SIZE=524288  # 512KB
                  echo "Client bundle size: $CLIENT_SIZE bytes"
                  if [ $CLIENT_SIZE -gt $MAX_SIZE ]; then
                    echo "Client bundle exceeds $MAX_SIZE bytes"
                    exit 1
                  fi
                  echo "Client bundle size OK"

    storybook-build:
        name: Storybook Build
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install mise
              uses: jdx/mise-action@v2

            - name: Install dependencies
              run: mise run install-ci

            - name: Build Storybook
              run: mise run build-storybook

    security:
        name: Security Audit
        runs-on: ubuntu-latest
        timeout-minutes: 5
        continue-on-error: true

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install mise
              uses: jdx/mise-action@v2

            - name: Security audit
              run: mise run security

    all-checks:
        name: All Checks Passed
        runs-on: ubuntu-latest
        needs: [quality-checks, unit-tests, e2e-tests, api-tests, build, storybook-build]
        if: always()

        steps:
            - name: Check all jobs
              if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
              run: exit 1
