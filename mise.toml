[tools]
bun = "1.3.10"

[env]
# Server
PORT = "4000"
CORS_ORIGIN = "*"
NODE_ENV = "development"
RATE_LIMIT_RPM = "600"
# Client
VITE_API_URL = "http://localhost:4000"
VITE_PORT = "3000"

# -- Dev servers ---------------------------------------------------------------

[tasks.dev]
description = "Start client and server in parallel"
run = "bun run dev"

[tasks.client]
description = "Start client dev server (port 3000)"
run = "bun run client"

[tasks.server]
description = "Start server dev server (port 4000)"
run = "bun run server"

[tasks.storybook]
description = "Start Storybook (port 6006)"
run = "bun run storybook"

# -- Dependencies --------------------------------------------------------------

[tasks.install]
description = "Install all dependencies"
run = "bun install"

[tasks.install-ci]
description = "Install all dependencies (frozen lockfile)"
run = "bun install --frozen-lockfile"

[tasks.install-playwright]
description = "Install Playwright browsers"
run = "bunx playwright install"

# -- Code quality --------------------------------------------------------------

[tasks.format]
description = "Format all files with Biome (auto-fix)"
run = "bun run format"

[tasks.lint]
description = "Lint all files with Biome (auto-fix)"
run = "bun run lint"

[tasks.biome-check]
description = "Check lint and format with Biome (no auto-fix, CI mode)"
run = "bun run check:ci"

[tasks.type-check]
description = "Type-check all packages"
run = "bun run type-check"

# -- Tests ---------------------------------------------------------------------

[tasks.test]
description = "Run all unit tests"
run = "bun run test:unit"

[tasks.test-watch]
description = "Run unit tests in watch mode"
run = "bun run test:watch"

[tasks.test-coverage]
description = "Run unit tests with coverage"
run = "bun run test:coverage"

[tasks.test-e2e]
description = "Run Playwright E2E tests"
run = "bun run test:e2e"

[tasks.test-api]
description = "Run Bruno API tests against local server"
run = "bun run test:api"

[tasks.test-all]
description = "Run API and E2E tests in parallel (requires servers running)"
run = "bun run test:all"

# -- Build ---------------------------------------------------------------------

[tasks.build]
description = "Build all packages (shared + server via bun build, client via vite)"
run = """
cd packages/shared && bun run build
cd ../server && bun run build
cd ../client && bun run build
"""

[tasks.build-storybook]
description = "Build Storybook"
dir = "packages/client"
run = "bun run build-storybook"

# -- CI ------------------------------------------------------------------------

[tasks.security]
description = "Run security audit"
run = "bun audit"

[tasks.ci]
description = "Run all CI checks (mirrors GitHub Actions ci.yml)"
depends = ["install-ci"]
run = """
mise run biome-check
mise run type-check
mise run test
mise run install-playwright
kill $(lsof -ti:3000,4000) 2>/dev/null || true
(cd packages/server && bun run start) &
SERVER_PID=$!
bunx wait-on http-get://localhost:4000/api/health --timeout 30000
(cd packages/client && bun run dev) &
CLIENT_PID=$!
bunx wait-on http-get://localhost:3000 --timeout 30000
mise run test-e2e
mise run test-api
kill $SERVER_PID $CLIENT_PID 2>/dev/null || true
mise run build
mise run build-storybook
bun audit || echo "warning: security vulnerabilities found - review required"
"""
