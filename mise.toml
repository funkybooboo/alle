[tools]
bun = "1.3.10"

[env]
# Server
PORT = "4000"
CORS_ORIGIN = "*"
NODE_ENV = "development"
# Client
VITE_API_URL = "http://localhost:4000"
VITE_PORT = "3000"

[tasks.dev]
description = "Start client and server in parallel"
run = "bun run dev"

[tasks.client]
description = "Start client dev server (port 3000)"
run = "bun run client"

[tasks.server]
description = "Start server dev server (port 4000)"
run = "bun run server"

[tasks.storybook]
description = "Start Storybook (port 6006)"
run = "bun run storybook"

[tasks.build]
description = "Build the client"
run = "bun --cwd packages/client build"

[tasks.format]
description = "Format all files with Biome"
run = "bun run format"

[tasks.lint]
description = "Lint and auto-fix all files with Biome"
run = "bun run lint"

[tasks.check]
description = "Format and lint all files with Biome"
run = "bun run check"

[tasks.type-check]
description = "Type-check all packages"
run = "bun run type-check"

[tasks.validate]
description = "Run Biome CI and type-check (used in pre-commit)"
run = "bun run validate"

[tasks.test]
description = "Run all unit tests"
run = "bun run test:unit"

[tasks.test-watch]
description = "Run unit tests in watch mode"
run = "bun run test:watch"

[tasks.test-coverage]
description = "Run unit tests with coverage"
run = "bun run test:coverage"

[tasks.test-e2e]
description = "Run Playwright E2E tests (requires dev server running)"
run = "bun run test:e2e"

[tasks.test-api]
description = "Run Bruno API tests against local server"
run = "bun run test:api"

[tasks.test-all]
description = "Run API and E2E tests in parallel"
run = "bun run test:all"

[tasks.install]
description = "Install all dependencies"
run = "bun install"

[tasks.ci]
description = "Run all CI checks locally (quality, unit tests, build, security)"
run = """
bun install --frozen-lockfile
bun run lint:check
bun run format:check
bun run type-check
bun run test:unit
bun run --cwd packages/client build
bun audit || echo "warning: security vulnerabilities found - review required"
"""

[tasks.ci-full]
description = "Run all CI checks including E2E and API tests (requires servers)"
run = """
bun install --frozen-lockfile
bun run lint:check
bun run format:check
bun run type-check
bun run test:unit
bunx playwright install
kill $(lsof -ti:3000,4000) 2>/dev/null || true
bun run server &
SERVER_PID=$!
bunx wait-on tcp:localhost:4000 --timeout 30000
bun run client &
CLIENT_PID=$!
bunx wait-on tcp:localhost:3000 --timeout 30000
bun run test:e2e:no-server
bun run test:api
kill $SERVER_PID $CLIENT_PID 2>/dev/null || true
bun run --cwd packages/client build
bun audit || echo "warning: security vulnerabilities found - review required"
"""
